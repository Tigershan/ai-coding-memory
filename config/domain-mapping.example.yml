# domain-mapping.yml - 项目到领域的映射表
#
# 用途：当某个 project 属于某个共享业务领域时（多个项目共享同一套业务概念），
#       让 distill 阶段把含有"领域共享知识"的 topic 提升到 domain 层，
#       而不是锁死在单一 project 层，从而便于跨项目复用。
#
# 安装：cp domain-mapping.example.yml ~/.ai-memory/config/domain-mapping.yml
#       然后按你的实际情况编辑。

domains:
  # 示例 1：导购/搜索领域
  guidance-search:
    description: 阿里国际站买家导购、搜索、推荐相关项目
    projects:
      - winterfell
      - icbu-scene
      - icbu-search

  # 示例 2：交易领域
  trade:
    description: 订单、支付、履约等交易相关项目
    projects:
      - icbu-trade
      - icbu-payment

  # 示例 3：商家/卖家工作台
  seller-workspace:
    description: 商家管理、营销工具等
    projects:
      - alibaba-seller
      - marketing-center

# 示例：在你不需要 domain 层时，留空即可：
# domains: {}
